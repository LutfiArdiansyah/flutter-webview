name: webspace
description: "A Flutter application that displays webview from remote JSON configuration."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_animate: ^4.5.2
  google_fonts: ^6.3.2
  http: ^1.1.0
  intl: ^0.19.0
  webview_flutter: ^4.4.0
  webview_flutter_android: ^3.0.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
