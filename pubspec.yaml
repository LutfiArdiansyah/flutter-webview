name: anime_webview
description: "A Flutter application that displays webview from remote JSON configuration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView support
  webview_flutter: ^4.4.0

  # HTTP client for fetching URL
  http: ^1.1.0

  # For date formatting in logs
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
